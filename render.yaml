services:
  - type: web
    name: nanobanana-studio
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --omit=dev
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
